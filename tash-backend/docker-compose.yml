services:
  db:
    image: postgres:16
    container_name: tash-postgres
    environment:
      POSTGRES_USER: tash
      POSTGRES_PASSWORD: tash
      POSTGRES_DB: tash
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    # postgres:16 already ships contrib modules, so `CREATE EXTENSION btree_gist`
    # (run inside the Alembic migration) works out of the box.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tash -d tash"]
      interval: 5s
      timeout: 5s
      retries: 10
