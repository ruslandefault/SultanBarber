[alembic]
script_location = alembic
prepend_sys_path = .
# DB URL is read from the environment (DATABASE_URL) inside env.py; this is a
# harmless placeholder so alembic doesn't complain when the env var is absent.
sqlalchemy.url = postgresql+asyncpg://tash:tash@localhost:5432/tash

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
